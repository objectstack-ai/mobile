name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Type Check
        run: npx tsc --noEmit
      - name: Lint
        run: npx eslint . --ext .ts,.tsx
      - name: Test
        run: npx jest --ci --passWithNoTests
